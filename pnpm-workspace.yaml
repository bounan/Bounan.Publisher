packages:
  - packages/*
  - third-party/common/ts

catalog:
  '@aws-sdk/client-dynamodb': 3.1008.0
  '@aws-sdk/client-lambda': 3.1008.0
  '@aws-sdk/client-ssm': 3.1008.0
  '@aws-sdk/lib-dynamodb': 3.1008.0
  '@eslint/js': 10.0.1
  '@lightweight-clients/shikimori-graphql-api-lightweight-client': 1.1.1
  '@lightweight-clients/telegram-bot-api-lightweight-client': 9.5.0
  '@types/aws-lambda': 8.10.161
  '@types/node': 25.5.0
  '@vitest/coverage-v8': 4.1.0
  '@vitest/ui': 4.1.0
  aws-cdk: 2.1111.0
  aws-cdk-lib: 2.243.0
  cdk-lambda-llrt: 0.1.4
  constructs: 10.5.1
  cross-env: 10.1.0
  eslint: 10.0.3
  eslint-plugin-simple-import-sort: 12.1.1
  jiti: 2.6.1
  knip: 5.86.0
  npm-run-all: 4.1.5
  typescript: 5.9.3
  typescript-eslint: 8.57.0
  vitest: 4.1.0

# Use hoisted node linker for compatibility with LlrtFunction construct. This construct bundles
# dependencies using docker, which does not work with host's symlinks.
nodeLinker: hoisted

onlyBuiltDependencies:
  - aws-sdk
  - esbuild
