name: Master Checks (and Deploy)

on:
  workflow_dispatch:
  push:
    branches: [ "master" ]

permissions:
  contents: read
  pull-requests: read

jobs:
  prerelease-checks:
    name: Prerelease Checks
    uses: ./.github/workflows/shared-prerelease-checks.yml
    with:
      force: ${{ github.event_name == 'workflow_dispatch' }}

  deploy:
    name: Deploy
    environment: production
    runs-on: ubuntu-latest
    timeout-minutes: 3
    needs: prerelease-checks
    if: ${{ needs.prerelease-checks.outputs.code-changed == 'true' }}

    permissions:
      id-token: write
      contents: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: 'true'

      - name: Bump version and push tag
        id: tag
        uses: step-security/github-tag-action@9c71d71802cca8038be2220876265db07000b404 # v6.2.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag_prefix: ""
          default_bump: patch

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter infra...

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_PROD }}:role/github-actions-cdk-deploy-north-1
          aws-region: eu-north-1

      - name: Perform release
        run: pnpm run cdk:deploy --require-approval broadening
